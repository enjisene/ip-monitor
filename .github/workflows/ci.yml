name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ip_monitor_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ip_monitor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev iputils-ping

      - name: Run Linter
        run: bundle exec rubocop

      - name: Run Tests
        env:
          DATABASE_URL: postgres://ip_monitor_user:password@localhost:5432/ip_monitor_test
          RACK_ENV: test
        run: bundle exec rspec
